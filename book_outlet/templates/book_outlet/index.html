{% extends 'book_outlet/base.html' %}

{% block title %}All Books{% endblock %}

{% block content %}
    <h2 class="mb-2">All Books</h2>
    <p class="mb-4">Find your next great read!</p>
    <div class="book-list bg-dark bg-gradient text-white rounded p-4 shadow">
        {% for book in books %}
            <a href="{% url 'book_detail' book.id %}" class="book-item d-block border-bottom border-secondary pb-3 mb-3 text-decoration-none text-white">
                <h3>{{ book.title }}</h3>
                <p>Author: {{ book.author }}</p>
                <p>Price: ${{ book.price }}</p>
            </a>
        {% endfor %}
    </div>
{% endblock %}
