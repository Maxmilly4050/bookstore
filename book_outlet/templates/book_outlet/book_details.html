{% extends 'book_outlet/base.html' %}

{% block title %}{{ book.title }}{% endblock %}

{% block content %}
    <div class="book-details bg-dark bg-gradient text-white rounded p-4 shadow">
        <h2 class="mb-3">{{ book.title }}</h2>
        <p class="mb-2">Author: {{ book.author }}</p>
        <p class="mb-2">Price: ${{ book.price }}</p>
        <p class="mb-3">Description: {{ book.description }}</p>
        <a href="{% url 'home' %}" class="btn btn-secondary">Back to Books</a>
    </div>
{% endblock %}
